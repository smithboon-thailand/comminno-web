<!doctype html>
<!--
  Comm.Inno — Center of Excellence in Communication Innovation
  for the Development of Quality of Life and Sustainability
  Faculty of Communication Arts · Chulalongkorn University

  Default lang is "th"; LocaleProvider rewrites this attribute on mount
  based on the URL prefix (/th or /en).
-->
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Comm.Inno · Center of Excellence in Communication Innovation for the Development of Quality of Life and Sustainability · Chulalongkorn University</title>

    <!-- Manually written meta description (per writing rules — never auto-generate). -->
    <meta
      name="description"
      content="Comm.Inno คือศูนย์เชี่ยวชาญเฉพาะทางด้านนวัตกรรมการสื่อสารเพื่อการพัฒนาคุณภาพชีวิตและความยั่งยืน คณะนิเทศศาสตร์ จุฬาลงกรณ์มหาวิทยาลัย ที่เปลี่ยนงานวิจัยให้กลายเป็นเครื่องมือ หลักสูตรอบรม และแคมเปญที่ยกระดับคุณภาพชีวิตและความยั่งยืน" />

    <!-- Brand colour for mobile browser chrome -->
    <meta name="theme-color" content="#BD212D" />

    <!--
      Baseline canonical — the SPA's usePageMeta hook overrides this per-page on mount.
      Set to the TH home (default locale) so Lighthouse sees a valid canonical before
      JS executes. hreflang alternates declare both language versions.
    -->
    <link rel="canonical" href="https://comminno-go6lmsuy.manus.space/th" />
    <link rel="alternate" hreflang="th" href="https://comminno-go6lmsuy.manus.space/th" />
    <link rel="alternate" hreflang="en" href="https://comminno-go6lmsuy.manus.space/en" />
    <link rel="alternate" hreflang="x-default" href="https://comminno-go6lmsuy.manus.space/th" />

    <!-- Favicon: reuse the official logo SVG (the brand book endorses this). -->
    <link rel="icon" type="image/svg+xml" href="/logo-official.svg" />
    <!--
      Preconnect to Cloudinary so the TLS handshake completes before the
      LCP hero image fetch starts. Saves 200-400 ms on slow-4G profiles.
      crossorigin is required because Cloudinary is fetched as a CORS image.
    -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

    <!--
      Preload the two faces visible above the fold.
      • DM Serif Display: hero headline (LCP element on /en).
      • IBM Plex Sans Thai Looped: body copy on /th (the default locale).
      Inter and the 600-weight faces are loaded normally; their absence below
      the fold doesn't slow LCP.
    -->
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="/fonts/dm-serif-display-latin-400.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="/fonts/plex-sans-thai-looped-thai-400.woff2" />

    <!-- Open Graph (basic, manually authored) -->
    <meta property="og:title" content="Comm.Inno · Center of Excellence in Communication Innovation for the Development of Quality of Life and Sustainability" />
    <meta property="og:description" content="Communication that listens. Innovation that improves life." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo-official.svg" />

    <!--
      Site-wide Organization JSON-LD (page-specific JSON-LD is added via
      usePageMeta).  Hand-written; do not auto-generate.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Center of Excellence in Communication Innovation for the Development of Quality of Life and Sustainability",
      "alternateName": "Comm.Inno",
      "url": "https://comminno-go6lmsuy.manus.space",
      "logo": "https://comminno-go6lmsuy.manus.space/logo-official.svg",
      "parentOrganization": {
        "@type": "CollegeOrUniversity",
        "name": "Faculty of Communication Arts, Chulalongkorn University",
        "url": "https://www.commarts.chula.ac.th"
      },
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Mongkut Sammitr Building, 254 Phaya Thai Road",
        "addressLocality": "Wang Mai, Pathum Wan",
        "addressRegion": "Bangkok",
        "postalCode": "10330",
        "addressCountry": "TH"
      },
      "email": "comminno@chula.ac.th",
      "telephone": "+66-2-218-2215"
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
