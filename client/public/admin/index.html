<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Comm.Inno CMS · smoke test</title>
    <link rel="icon" type="image/svg+xml" href="/logo-official.svg" />
  </head>
  <body>
    <!--
      Phase 2 commit #0 smoke test.

      Engine is selected by the ?engine= query string:
        /admin               → Sveltia (default)
        /admin?engine=decap  → Decap CMS

      Both engines read the same config.yml in this folder. The point of the
      smoke test is to prove that swapping engines is a one-line script-tag
      change against an identical config — see PHASE2_PLAN.md §1, item D.

      Pattern follows the official Sveltia "Manual Installation" guide
      (https://sveltiacms.app/en/docs/start) and the official Decap install
      guide (https://decapcms.org/docs/install-decap-cms/): a single classic
      <script> tag pointing at unpkg, no module loader, no mount root — both
      engines render into <body> themselves once the script evaluates.
    -->
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var engine = params.get("engine") === "decap" ? "decap" : "sveltia";
        var src = engine === "decap"
          ? "https://unpkg.com/decap-cms@3.12.2/dist/decap-cms.js"
          : "https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js";
        var script = document.createElement("script");
        script.src = src;
        script.onerror = function () {
          document.body.innerHTML =
            '<div style="font-family:system-ui;padding:2rem;text-align:center;color:#1f2937">' +
              '<h1 style="color:#BD212D;font-size:1.5rem;margin-bottom:.5rem">CMS engine failed to load</h1>' +
              '<p>Tried <code>' + src + '</code>.</p>' +
              '<p>Check the Network tab and try the alternate engine via <code>?engine=' +
              (engine === "decap" ? "sveltia" : "decap") + '</code>.</p>' +
            '</div>';
        };
        document.body.appendChild(script);
        document.title = "Comm.Inno CMS · " + engine + " (smoke test)";
      })();
    </script>
  </body>
</html>
