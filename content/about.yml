    bioEn: Dr. Watsayut Kongchan focuses on public relations for public health, conflict communication, behavior-change board-game design, and LGBTQ+ health communication. He created the flagship course "Public Relations for Public Health" which integrates board-game design as a behavior-change tool, and designs games for sensitive-topic dialogue with ThaiPBS The Active.
    expertiseTh: ประชาสัมพันธ์เพื่อสุขภาพสาธารณะ · การสื่อสารความขัดแย้ง · การออกแบบบอร์ดเกมเพื่อเปลี่ยนพฤติกรรม · การสื่อสาร LGBTQ+ · การสื่อสารเรื่องการใช้สาร · Game-based Learning · การสื่อสาร SDG · Data Storytelling · สื่อใหม่ AR/VR/XR
    expertiseEn: PR for Public Health · Conflict Communication · Board Game Design for Behavior Change · LGBTQ+ Health Communication · Substance Use Communication · Game-based Learning · SDG Communication · Data Storytelling · AR/VR/XR for PR
