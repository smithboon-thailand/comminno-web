    bioTh: รศ. ดร. สมิทธิ์ บุญชุติมา เป็นผู้ก่อตั้งและหัวหน้าศูนย์เชี่ยวชาญเฉพาะทางด้านนวัตกรรมการสื่อสารเพื่อการพัฒนาคุณภาพชีวิตและความยั่งยืน โดยมีความเชี่ยวชาญด้านการสื่อสารสุขภาพ การสื่อสารความเสี่ยง การสื่อสารข้ามวัฒนธรรม และการประชาสัมพันธ์เชิงกลยุทธ์ ผลงานวิจัยครอบคลุมสุขภาพแรงงานข้ามชาติเมียนมา การป้องกัน HIV/AIDS การตลาดดิจิทัล AI ในประชาสัมพันธ์ VTubers และ Augmented Reality รวมถึงการสื่อสารกีฬาเพื่อสุขภาพ ปัจจุบันดำรงตำแหน่งประธาน Asian Congress for Media and Communication (ACMC) วาระ 2024–2026 เป็นกองบรรณาธิการวารสาร BMC Public Health (Springer Nature) มีผลงานตีพิมพ์กว่า 60 ชิ้น ถูกอ้างอิง (citations) รวม 231 ครั้ง มี h-index 9 และ i10-index 8 และเป็นผู้ทบทวนบทความให้กับวารสารนานาชาติมากกว่า 20 ฉบับ มีเครือข่ายความร่วมมือกับ Mahidol-Oxford Tropical Medicine Research Unit (MORU) มหาวิทยาลัย Oxford มหาวิทยาลัย Syracuse และมหาวิทยาลัยชั้นนำในภูมิภาคเอเชีย และเป็นที่ปรึกษาด้านการสื่อสารให้กับหน่วยงานภาครัฐและรัฐวิสาหกิจ อาทิ การไฟฟ้าส่วนภูมิภาค (PEA) สำนักงาน กสทช. (NBTC) กรมควบคุมโรค และสำนักงานนวัตกรรมแห่งชาติ (NIA)
    bioEn: Assoc. Prof. Smith Boonchutima is the founding head of Comm.Inno — the Center of Excellence in Communication Innovation for the Development of Quality of Life and Sustainability. His research spans health and risk communication, transnational communication, migrant-worker health (Myanmar communities in Thailand's seafood industry), HIV/AIDS prevention and stigma reduction, AI in public relations, VTubers and AR marketing, and sport communication for health. He currently serves as President of the Asian Congress for Media and Communication (ACMC) 2024–2026, as Editorial Board Member of BMC Public Health (Springer Nature, IF 3.6), and as communication consultant to Thailand's Department of Disease Control, the National Innovation Agency (NIA), the Provincial Electricity Authority (PEA) and the NBTC. He has 60+ peer-reviewed publications, 231 citations, h-index 9, i10-index 8 (Google Scholar, Dec 2025), and reviews for 20+ international journals including PLOS ONE, American Behavioral Scientist, BMC Infectious Diseases, Heliyon and the International Journal of Strategic Communication. Active collaborations with the Mahidol-Oxford Tropical Medicine Research Unit (MORU), the University of Oxford, Syracuse University, and partner universities across Asia.
    expertiseTh: การสื่อสารสุขภาพ · การสื่อสารความเสี่ยง · สุขภาพแรงงานข้ามชาติเมียนมา · การป้องกัน HIV/AIDS และลดตราบาป · การสื่อสารข้ามวัฒนธรรม · ประชาสัมพันธ์เชิงกลยุทธ์ · AI ในการประชาสัมพันธ์ · VTubers · Augmented Reality Marketing · การสื่อสารกีฬาเพื่อสุขภาพ
    expertiseEn: Health Communication · Risk Communication · Transnational Communication · Myanmar Migrant-Worker Health · HIV/AIDS Prevention & Stigma Reduction · Strategic PR · AI in Public Relations · VTubers · Augmented Reality Marketing · Sport Communication for Health
