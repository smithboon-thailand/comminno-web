ogDescription: "TOKYO – Faculty members and students from Chulalongkorn University’s Department of Public Relations visited leading institutions in Japan to strengthen international academic ties and foster innovative communication practices.Keio University: Peace Playground Workshop\_On March 11, 2026, the delegation visited Keio University’s Graduate School of Media Design (KMD). Welcomed by Dean Masa Inakage, the group hosted the “Peace Playground: A Workshop on Metaphor & Art” led by Asst. Prof. Dr. Teerada"
