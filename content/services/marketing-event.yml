  - จัดสถานที่และโลจิสติกส์
  - ประสานงานวิทยากรและแขก
  - เวที แสง และการตกแต่ง
  - จัดงานเปิดตัวและกิจกรรม
  - ถ่ายทอดสดผ่านทีวีและออนไลน์
  - ประเมินผลกิจกรรม
