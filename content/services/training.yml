slug: training
titleEn: Training programs
titleTh: หลักสูตรอบรม
subtitleEn: One day. Twelve case studies. Skills your team can use Monday.
subtitleTh: หนึ่งวัน · 12 กรณีศึกษา · ทักษะที่ทีมคุณใช้ได้ทันทีวันจันทร์
sdgNumber: 4
descriptionEn: Our training programs treat learning as a system, not a one-off event. Every program starts with a needs assessment with the client, builds a custom curriculum tied to measurable outcomes, ships a participant manual, runs the sessions, and ends with an evaluation report comparing pre- and post-training competencies. We've designed programs for executive crisis communication, public-health communication, leadership for state enterprises, and youth empowerment. Programs run from one-day intensives to multi-month cohorts.
descriptionTh: หลักสูตรอบรมของเรามองการเรียนรู้เป็นระบบ ไม่ใช่งานครั้งเดียว ทุกหลักสูตรเริ่มต้นด้วยการประเมินความต้องการกับลูกค้า สร้างหลักสูตรที่ตอบโจทย์เฉพาะพร้อมตัวชี้วัดที่วัดได้ ผลิตคู่มือสำหรับผู้เข้าอบรม จัดอบรม และจบด้วยรายงานประเมินผลที่เปรียบเทียบสมรรถนะก่อน-หลังอบรม เราเคยออกแบบหลักสูตรการสื่อสารวิกฤตให้ผู้บริหาร การสื่อสารด้านสาธารณสุข ภาวะผู้นำสำหรับรัฐวิสาหกิจ และเยาวชนผู้นำการเปลี่ยนแปลง หลักสูตรมีตั้งแต่ 1 วันไปจนถึงหลายเดือน
