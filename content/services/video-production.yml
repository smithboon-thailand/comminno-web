slug: video-production
titleEn: Video production
titleTh: ผลิตวีดิทัศน์
subtitleEn: Research findings, made watchable.
subtitleTh: เปลี่ยนงานวิจัยให้กลายเป็นวิดีโอที่คนอยากดู
sdgNumber: 9
descriptionEn: "We produce video content that organisations actually need: introduction films, work-summary reels, educational explainers, and research-dissemination pieces that translate journal-grade findings into 90 seconds a layperson can follow. Every project starts with a script written by someone who understands the source material — usually a researcher on our team. Production runs through our in-house team of editors, motion designers, and Thai/English voice talent."
descriptionTh: เราผลิตวิดีโอที่องค์กรต้องใช้จริง — วีดิทัศน์แนะนำองค์กร, วีดิทัศน์สรุปผลงาน, วีดิทัศน์การศึกษา และวีดิทัศน์เผยแพร่งานวิจัยที่แปลผลการศึกษาระดับวารสารวิชาการให้กลายเป็น 90 วินาทีที่คนทั่วไปดูเข้าใจ ทุกโปรเจกต์เริ่มจากบทที่เขียนโดยคนเข้าใจเนื้อหา ส่วนใหญ่เป็นนักวิจัยในทีมของเราเอง การผลิตทำโดยทีมในองค์กร ทั้งบรรณาธิการ ผู้ออกแบบโมชัน และพากย์เสียงภาษาไทย-อังกฤษ
